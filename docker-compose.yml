# Galaxia — orchestration galaxie fille PME
#
# Sur OpenJeff (galaxie mère), les services tournent en systemd direct
# (cf. ops/*.service) pour itérer vite. Pour une galaxie fille PME,
# ce docker-compose.yml démarre la stack complète :
#
#   docker compose --profile pme up -d
#
# Pré-requis avant `up` :
#   - /opt/galaxia/config/.env produit par scripts/wizard.sh
#     (contient ANTHROPIC_API_KEY, JEFF_PASS_HASH, SESSION_SECRET,
#      BOT_TOKEN, ALLOWED_CHAT_ID, COCKPIT_DOMAIN, ACME_EMAIL, etc.)
#   - DNS A record sur COCKPIT_DOMAIN pointant vers l'IP du serveur PME
#
# Profils :
#   - `cockpit` : juste le cockpit (utile pour dev local)
#   - `pme`     : stack complète (cockpit + bot Telegram + Caddy + Ollama)

x-galaxia-env: &galaxia-env
  env_file:
    - path: /opt/galaxia/config/galaxia.conf
      required: false
    - path: /opt/galaxia/config/.env
      required: false

services:
  cockpit:
    <<: *galaxia-env
    build:
      context: ./apps/cockpit
      dockerfile: Dockerfile
    image: galaxia/cockpit:latest
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      HOST: 0.0.0.0
      PORT: "3000"
      ORIGIN: ${COCKPIT_ORIGIN:-https://app.galaxia-os.com}
      COCKPIT_DB_PATH: /app/data/cockpit.db
      # Désactive le filesystem MCP côté fille (chemins host-spécifiques),
      # à ré-activer par la PME via override si elle veut.
      COCKPIT_MCP_FS_ROOTS: "-"
    volumes:
      - cockpit_data:/app/data
    profiles: ["cockpit", "pme"]

  bot:
    <<: *galaxia-env
    build:
      context: ./agents/telegram
      dockerfile: Dockerfile
    image: galaxia/bot:latest
    restart: unless-stopped
    environment:
      COCKPIT_DB_PATH: /cockpit_data/cockpit.db
      INBOX_PATH: /bot_data/inbox.md
    volumes:
      - cockpit_data:/cockpit_data
      - bot_data:/bot_data
    depends_on:
      - cockpit
    profiles: ["pme"]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile.compose:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      COCKPIT_DOMAIN: ${COCKPIT_DOMAIN:-app.example.com}
      ACME_EMAIL: ${ACME_EMAIL:-admin@example.com}
    depends_on:
      - cockpit
    profiles: ["pme"]

  noop:
    <<: *galaxia-env
    image: alpine:3
    command: ["sh", "-c", "echo Galaxia compose stack placeholder; sleep infinity"]
    restart: "no"
    profiles: ["never"]

volumes:
  cockpit_data:
  bot_data:
  caddy_data:
  caddy_config:
