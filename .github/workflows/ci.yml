name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    name: shellcheck (scripts/*.sh, ops/**/*.sh)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          # SC1091: ne pas suivre les sources externes (fichiers .env générés)
          # SC2155: declare+assign séparé — trop intrusif pour notre style bash
          shellcheck \
            --severity=warning \
            --exclude=SC1091,SC2155 \
            scripts/install.sh \
            scripts/wizard.sh \
            scripts/galaxia \
            scripts/galaxia-update.sh \
            scripts/galaxia-publish.sh \
            scripts/health.sh \
            ops/sandbox/nemoclaw/run.sh

  veille-tests:
    name: agents/veille tests (offline subset)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Run tests (Ollama integration test self-skips when unreachable)
        working-directory: agents/veille
        run: node --test test/*.test.js

  restaurant-tests:
    name: projects/restaurant pipeline tests (stdlib, hermetic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run dry-run + runtime + discovery tests
        # Stdlib only (unittest/sqlite3/urllib) — aucune dépendance à installer.
        # Suite hermétique : appels réseau (Ollama, Overpass) monkeypatchés, base
        # SQLite en tempfile, fixtures de démo versionnées (data/fixtures.json).
        working-directory: projects/restaurant
        run: python -m unittest discover -s tests -v

  compose-validate:
    name: docker compose config (env_file optional, anchor merge)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate without wizard-produced files
        env:
          COMPOSE_PROJECT_NAME: galaxia-ci
        run: |
          # Should succeed even though /opt/galaxia/config/.env doesn't exist
          # thanks to required: false on the env_file entries. We force
          # COMPOSE_PROJECT_NAME because the runner's checkout dir name
          # (galaxia_os) differs from the local dir (galaxia-project).
          docker compose --profile never config > /tmp/compose-rendered.yml
          grep -q '^services:' /tmp/compose-rendered.yml
          grep -q '  noop:' /tmp/compose-rendered.yml
      - name: Validate with wizard-produced files present
        run: |
          sudo mkdir -p /opt/galaxia/config
          printf 'GALAXIA_PRIVACY_MODE=local\nGALAXIA_LLM_PROVIDER=ollama\n' | sudo tee /opt/galaxia/config/galaxia.conf >/dev/null
          printf '# no secrets in local mode\n' | sudo tee /opt/galaxia/config/.env >/dev/null
          sudo chown -R "$USER:$USER" /opt/galaxia/config
          sudo chmod 600 /opt/galaxia/config/.env
          docker compose --profile never config

  update-poc:
    name: galaxia-update.sh signed fixture round-trip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install cosign v2 (air-gapped friendly flow)
        run: |
          curl -sL https://github.com/sigstore/cosign/releases/download/v2.4.3/cosign-linux-amd64 \
            -o /tmp/cosign
          sudo install -m 0755 /tmp/cosign /usr/local/bin/cosign
          cosign version
      - name: Build signed fixture, run update script, assert VERSION
        env:
          COSIGN_PASSWORD: ''
        run: |
          set -euo pipefail
          fixture=$RUNNER_TEMP/fixture
          keys=$RUNNER_TEMP/keys
          install_dir=$RUNNER_TEMP/galaxia-install
          mkdir -p "$fixture" "$keys"
          cd "$keys" && cosign generate-key-pair >/dev/null && cd -

          cat > "$fixture/stable.json" <<'EOF'
          {"schema":1,"version":"v0.0.0-ci","released_at":"2026-01-01T00:00:00Z","channel":"stable","images":{},"notes":"CI fixture"}
          EOF

          cosign sign-blob --yes --tlog-upload=false \
            --key "$keys/cosign.key" \
            --output-signature "$fixture/stable.json.sig" \
            "$fixture/stable.json"

          # Happy path
          GALAXIA_DIR="$install_dir" \
          GALAXIA_UPDATE_FIXTURE="$fixture" \
          COSIGN_PUBKEY="$keys/cosign.pub" \
          LOG_FILE="$install_dir/update.log" \
          VERSION_FILE="$install_dir/VERSION" \
            bash scripts/galaxia-update.sh
          test "$(cat "$install_dir/VERSION")" = "v0.0.0-ci"

          # Idempotence (same version → exit 0, no-op)
          GALAXIA_DIR="$install_dir" \
          GALAXIA_UPDATE_FIXTURE="$fixture" \
          COSIGN_PUBKEY="$keys/cosign.pub" \
          LOG_FILE="$install_dir/update.log" \
          VERSION_FILE="$install_dir/VERSION" \
            bash scripts/galaxia-update.sh

          # Bad signature must reject
          echo 'CORRUPTED' > "$fixture/stable.json.sig"
          rm -rf "$install_dir/VERSION"
          if GALAXIA_DIR="$install_dir" \
             GALAXIA_UPDATE_FIXTURE="$fixture" \
             COSIGN_PUBKEY="$keys/cosign.pub" \
             LOG_FILE="$install_dir/update.log" \
             VERSION_FILE="$install_dir/VERSION" \
               bash scripts/galaxia-update.sh; then
            echo "FAIL: expected non-zero exit on corrupted signature" >&2
            exit 1
          fi
          test ! -f "$install_dir/VERSION"

  cli-smoke:
    name: scripts/galaxia CLI help + version + unknown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: galaxia help must list the documented subcommands
        run: |
          out=$(bash scripts/galaxia help)
          # Help should mention every documented subcommand
          echo "$out" | grep -q 'galaxia status'
          echo "$out" | grep -q 'galaxia version'
          echo "$out" | grep -q 'galaxia update'
          echo "$out" | grep -q 'galaxia config'
          echo "$out" | grep -q 'galaxia logs'
          echo "$out" | grep -q 'galaxia veille'
      - name: galaxia version (no VERSION file)
        run: |
          out=$(GALAXIA_DIR=/tmp/no-such-dir bash scripts/galaxia version)
          echo "$out" | grep -q 'version inconnue'
      - name: galaxia version (with VERSION file)
        run: |
          mkdir -p /tmp/galaxia-cli-test
          echo 'v9.9.9-ci' > /tmp/galaxia-cli-test/VERSION
          out=$(GALAXIA_DIR=/tmp/galaxia-cli-test bash scripts/galaxia version)
          test "$out" = "v9.9.9-ci"
      - name: galaxia <unknown> must exit non-zero with a hint
        run: |
          if bash scripts/galaxia nope >/dev/null 2>&1; then
            echo "FAIL: expected non-zero exit" >&2
            exit 1
          fi

  install-e2e:
    name: install.sh E2E in fresh Ubuntu container (test mode)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build E2E image
        run: docker build -f ops/e2e/Dockerfile -t galaxia-e2e:ci .
      - name: Run E2E test
        run: docker run --rm galaxia-e2e:ci

  wizard-dryrun:
    name: scripts/wizard.sh non-interactive (ollama path)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install argon2 (used by wizard to hash cockpit password)
        run: sudo apt-get update -qq && sudo apt-get install -y argon2
      - name: Run wizard in non-interactive mode (no API key needed in local mode)
        env:
          GALAXIA_NON_INTERACTIVE: '1'
          GALAXIA_CONFIG_DIR: ${{ runner.temp }}/galaxia-config
          GALAXIA_PRIVACY_MODE: local
          GALAXIA_LLM_PROVIDER: ollama
          GALAXIA_DOMAIN: ''
          GALAXIA_DASHBOARD_MODE: tunnel
          GALAXIA_WAKE_WORD: 'Hey Galaxia'
          GALAXIA_COCKPIT_PASSWORD: 'ci-test-password-do-not-use'
        run: bash scripts/wizard.sh
      - name: Assert config files were produced
        run: |
          test -f "${{ runner.temp }}/galaxia-config/galaxia.conf"
          test -f "${{ runner.temp }}/galaxia-config/.env"
          # .env should be chmod 600
          [ "$(stat -c '%a' "${{ runner.temp }}/galaxia-config/.env")" = "600" ]
          # config must contain the chosen provider
          grep -q '^GALAXIA_LLM_PROVIDER=ollama$' "${{ runner.temp }}/galaxia-config/galaxia.conf"

  cockpit-smoke:
    name: cockpit — public surface browser smoke (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            apps/cockpit/package-lock.json
            ops/browser-smoke/package-lock.json
      - name: Install cockpit deps (native modules — better-sqlite3, argon2)
        working-directory: apps/cockpit
        run: npm ci --no-audit --no-fund
      - name: Build cockpit (adapter-node)
        working-directory: apps/cockpit
        run: npm run build
      - name: Install browser-smoke deps
        working-directory: ops/browser-smoke
        run: npm ci --no-audit --no-fund
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          # lockfile pin → cache invalide automatiquement quand on bump playwright
          key: pw-${{ runner.os }}-${{ hashFiles('ops/browser-smoke/package-lock.json') }}
      - name: Install Chromium (if cache miss)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        working-directory: ops/browser-smoke
        run: npx playwright install chromium
      - name: Install Chromium system deps (libnss3, libnspr4 etc.)
        working-directory: ops/browser-smoke
        run: npx playwright install-deps chromium
      - name: Boot cockpit (stub env — SESSION_SECRET only, ANTHROPIC_API_KEY non requis pour la surface publique)
        working-directory: apps/cockpit
        env:
          HOST: 127.0.0.1
          PORT: '3009'
          ORIGIN: http://127.0.0.1:3009
          NODE_ENV: production
          COCKPIT_DB_PATH: ${{ runner.temp }}/cockpit-smoke/cockpit.db
          COCKPIT_BRIEFS_DIR: ${{ runner.temp }}/cockpit-smoke/briefs
          # ADMIN_EMAIL est requis depuis Sprint 2 (multi-user). On utilise un
          # stub : la migration provisionne un admin en base, sans envoyer de mail.
          ADMIN_EMAIL: admin@example.test
        run: |
          mkdir -p "${{ runner.temp }}/cockpit-smoke/briefs"
          SESSION_SECRET="$(node -e 'console.log(require("crypto").randomBytes(48).toString("base64"))')" \
            node build > "${{ runner.temp }}/cockpit-smoke/cockpit.log" 2>&1 &
          echo $! > "${{ runner.temp }}/cockpit-smoke/cockpit.pid"
          timeout 30 bash -c 'until curl -sf -o /dev/null http://127.0.0.1:3009/login; do sleep 0.5; done'
      - name: Run browser smoke
        working-directory: ops/browser-smoke
        env:
          BASE_URL: http://127.0.0.1:3009
        run: node test.mjs
      - name: Stop cockpit
        if: always()
        run: kill "$(cat "${{ runner.temp }}/cockpit-smoke/cockpit.pid")" 2>/dev/null || true
      - name: Upload cockpit log + screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cockpit-smoke-debug
          path: |
            ${{ runner.temp }}/cockpit-smoke/cockpit.log
            ops/browser-smoke/out
          if-no-files-found: ignore
          retention-days: 7
