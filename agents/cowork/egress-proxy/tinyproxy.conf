# Galaxia Cowork — proxy d'egress FILTRÉ pour les bacs à sable.
#
# Posture souveraine (cf. docs/COWORK.md) : une sous-tâche Cowork tourne dans un
# conteneur attaché au réseau docker INTERNE `cowork-egress` (aucun NAT vers
# l'extérieur). Son SEUL chemin sortant est ce proxy, qui n'autorise QUE les
# hôtes de l'allowlist (l'API du modèle). Tout le reste est refusé : une
# sous-tâche ne peut ni exfiltrer /workspace vers un hôte arbitraire, ni tirer
# un payload depuis le net. C'est le « network=none » assoupli au strict minimum
# nécessaire pour que l'agent in-sandbox joigne le LLM, et rien d'autre.

# NB : pas de directive User/Group ici. Le conteneur est lancé directement en
# nobody (`docker run --user 65534:65534`), donc tinyproxy n'a pas à faire de
# setuid/setgid — ce qui échouerait de toute façon sous --cap-drop=ALL (plus de
# CAP_SETUID/CAP_SETGID).

# Port d'écoute (atteint uniquement depuis le réseau interne cowork-egress et
# depuis le leg WAN du proxy lui-même).
Port 8888
Listen 0.0.0.0

# Le LLM peut être lent : on aligne le timeout sur le mur d'une sous-tâche.
Timeout 600

LogLevel Info
MaxClients 50

# Qui peut utiliser le proxy. L'isolation réseau (réseau interne + le proxy n'est
# joignable que par les sandbox) fait déjà le gros du filtrage côté clients ; on
# laisse passer puis on filtre par DESTINATION ci-dessous (le vrai garde-fou).
Allow 0.0.0.0/0

# --- Garde-fou par destination (le cœur du filtrage) -------------------------
# FilterDefaultDeny Yes => SEULS les hôtes listés dans le fichier filter sont
# autorisés ; tout le reste est rejeté. S'applique aussi aux requêtes CONNECT
# (HTTPS), donc au tunnel TLS vers l'API du modèle.
FilterDefaultDeny Yes
Filter "/etc/tinyproxy/allowlist.filter"
FilterExtended On
FilterCaseSensitive Off

# CONNECT (HTTPS) restreint au port 443 : pas de tunnel vers un port arbitraire.
ConnectPort 443

# Pas d'en-tête révélant le proxy / pas de Via.
DisableViaHeader Yes
